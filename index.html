<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary SEO -->
    <title>TypeNova-X — Master Your Typing Speed</title>
    <meta name="description" content="TypeNova-X is a precision typing speed test for developers, writers, and speed demons. Real-time WPM, accuracy tracking, streaks, difficulty levels, and leaderboards." />
    <meta name="keywords" content="typing test, typing speed, WPM, words per minute, typing practice, typing game, keyboard typing" />
    <meta name="author" content="TypeNova-X" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://typenova-x.vercel.app/" />
    <meta property="og:title"       content="TypeNova-X — Master Your Typing Speed" />
    <meta property="og:description" content="Precision typing speed test with real-time WPM, accuracy tracking, streaks, difficulty levels, and leaderboards." />
    <meta property="og:image"       content="https://typenova-x.vercel.app/og-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="TypeNova-X — Master Your Typing Speed" />
    <meta name="twitter:description" content="Precision typing speed test. Real-time WPM, accuracy, streaks, and leaderboards." />
    <meta name="twitter:image"       content="https://typenova-x.vercel.app/og-image.png" />

    <!-- Theme / PWA -->
    <meta name="theme-color" content="#07070f" />
    <meta name="color-scheme" content="dark" />
    <meta name="application-name" content="TypeNova-X" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TypeNova-X" />

    <!-- Favicon -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon"             type="image/png" sizes="32x32" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Google Fonts — preconnect first for speed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Accessible no-JS fallback -->
    <noscript>
      <div style="background:#07070f;color:#f1f0ff;font-family:monospace;padding:2rem;text-align:center;">
        TypeNova-X requires JavaScript to run. Please enable JavaScript in your browser.
      </div>
    </noscript>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
